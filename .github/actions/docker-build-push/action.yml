name: 'Docker Build and Push'
description: 'Set up Buildx and build+push an image tagged :latest and :<sha>'

inputs:
  image-name:
    description: 'Docker Hub image name, e.g. user/repo'
    required: true
  context:
    description: 'Build context path'
    required: false
    default: '.'

runs:
  using: 'composite'
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.context }}
        push: true
        tags: |
          ${{ inputs.image-name }}:latest
          ${{ inputs.image-name }}:${{ github.sha }}
